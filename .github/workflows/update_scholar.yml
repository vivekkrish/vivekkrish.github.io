name: Update Google Scholar Metrics

on:
  schedule:
    # Run daily at 04:37 UTC (21:37 PDT) to avoid GHA runner peak hourly traffic and IP blocks
    - cron: '37 4 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission to commit and push changes back to the repository

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-size: '3.10' # Quick load

      - name: Run Scholar Update Script
        run: python scripts/update_scholar.py

      - name: Commit and Push if metrics or publications changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage files and check if there are modifications
          git add assets/resources/citation_metrics.json assets/resources/publications_list.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update Google Scholar metrics & publications [skip ci]"
            git push
          else
            echo "No changes in Google Scholar metrics or publications."
          fi
